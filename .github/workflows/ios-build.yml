name: Build iOS IPA (unsigned)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Cache CocoaPods specs repo
        uses: actions/cache@v4
        with:
          path: ~/.cocoapods/repos
          key: ${{ runner.os }}-cocoapods-specs-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-cocoapods-specs-

      - name: Expo prebuild (iOS, clean)
        run: npx expo prebuild --platform ios --no-install --clean

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Discover workspace and scheme
        id: discover
        run: |
          cd ios
          echo "=== ios/ contents ==="
          ls -la
          echo ""
          PROJECT=$(ls -d *.xcodeproj 2>/dev/null | head -1 | sed 's/\.xcodeproj$//')
          WORKSPACE="${PROJECT}.xcworkspace"
          if [ -z "$PROJECT" ] || [ ! -d "$WORKSPACE" ]; then
            echo "ERROR: could not derive project/workspace"
            exit 1
          fi
          echo "project=$PROJECT" >> "$GITHUB_OUTPUT"
          echo "workspace=$WORKSPACE" >> "$GITHUB_OUTPUT"
          echo "scheme=$PROJECT" >> "$GITHUB_OUTPUT"
          echo "Project: $PROJECT"
          echo "Workspace: $WORKSPACE"
          echo "Scheme:    $PROJECT"
          echo ""
          echo "=== All available schemes (for reference) ==="
          xcodebuild -workspace "$WORKSPACE" -list 2>&1 | head -80

      - name: Build (unsigned)
        run: |
          cd ios
          xcodebuild \
            -workspace "${{ steps.discover.outputs.workspace }}" \
            -scheme "${{ steps.discover.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Package IPA
        run: |
          cd ios
          APP_PATH=$(find build -type d -name "*.app" -path "*/Release-iphoneos/*" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: no .app produced. Diagnostic dump of build/ tree:"
            echo "--- All .app folders found ---"
            find build -type d -name "*.app" 2>/dev/null || echo "(none)"
            echo "--- build/Build/Products/ contents ---"
            ls -la build/Build/Products/ 2>/dev/null || echo "(missing)"
            echo "--- Full build/ tree (first 100 entries) ---"
            find build -maxdepth 5 -type d 2>/dev/null | head -100
            exit 1
          fi
          echo "Found .app at: $APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          IPA_NAME="FinancasPessoais-$(date -u +%Y%m%d-%H%M%S).ipa"
          zip -r "$IPA_NAME" Payload
          echo "IPA_NAME=$IPA_NAME" >> "$GITHUB_ENV"
          ls -la "$IPA_NAME"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: FinancasPessoais-ios-ipa
          path: ios/${{ env.IPA_NAME }}
          if-no-files-found: error
          retention-days: 30
